paths:
  raw_dir: "data/raw"
  interim_audio_dir: "data/interim/audio"
  interim_frames_dir: "data/interim/frames"
  interim_transcripts_dir: "data/interim/transcripts"
  interim_captions_dir: "data/interim/captions"
  processed_dir: "data/processed"
  vector_db_dir: "data/vector_db"
  video_catalog_path: "data/video_catalog.json"

video:
  frame_sampling_fps: 1
  max_frames: 240
  max_frame_width: 960
  max_frame_height: 540
  allowed_suffixes: [".mp4", ".avi", ".mov", ".mkv", ".webm"]

models:
  whisper:
    name: "base"
    language: "auto"
    use_fp16: true
    fallback_to_cpu_on_oom: true

  vision:
    blip_name: "Salesforce/blip-image-captioning-base"
    clip_name: "ViT-B-32"
    clip_pretrained: "openai"
    max_length: 40
    image_size: 384
    fallback_to_cpu_on_oom: true
    output_language: "en"

  embedding:
    name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
    batch_size: 32
    normalize_embeddings: true

pipeline:
  version: "2.2.0"
  segment_window: 3
  segment_overlap: 1
  caption_merge_window_sec: 3.0
  caption_dedup_min_gap_sec: 2.0
  enable_multimodal_documents: true
  save_run_metadata: true
  max_top_k: 50
  default_top_k: 5
  hybrid_search_alpha: 0.35
  clip_search_beta: 0.65
  hybrid_candidate_multiplier: 3

metadata:
  default_video_type: "generic"
  default_estimated_content_style: "generic"
  auto_infer_content_style: true
  auto_infer_recommended_search_mode: true

retrieval:
  topic_bonus_for_talk: 0.08
  action_bonus_for_action_video: 0.06
  visual_bonus_for_visual_video: 0.06
  audio_penalty_for_cinematic_music: 0.08
  multimodal_bonus_for_talk: 0.04

vector_db:
  text_collection_name: "video_semantic_search_text"
  clip_collection_name: "video_semantic_search_clip"
  distance_metric: "cosine"
  export_batch_size: 1000

reranker:
  enabled: false
  model_name: "cross-encoder/ms-marco-MiniLM-L-6-v2"
  top_k_rerank: 50
  score_weight: 0.5

api:
  base_url: "http://127.0.0.1:8000"
  