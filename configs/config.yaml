paths:
  raw_dir: "data/raw"
  interim_audio_dir: "data/interim/audio"
  interim_frames_dir: "data/interim/frames"
  interim_transcripts_dir: "data/interim/transcripts"
  interim_captions_dir: "data/interim/captions"
  processed_dir: "data/processed"
  vector_db_dir: "data/vector_db"

video:
  frame_sampling_fps: 0.5
  max_frames: 180
  max_frame_width: 960
  max_frame_height: 540
  allowed_suffixes: [".mp4", ".avi", ".mov", ".mkv", ".webm"]

models:
  whisper:
    name: "base"
    language: "auto"
    use_fp16: true
    fallback_to_cpu_on_oom: true

  vision:
    name: "Salesforce/blip-image-captioning-base"
    max_length: 40
    image_size: 384
    fallback_to_cpu_on_oom: true
    output_language: "en"

  embedding:
    name: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
    batch_size: 32
    normalize_embeddings: true

pipeline:
  version: "1.2.0"
  segment_window: 3
  segment_overlap: 1
  caption_merge_window_sec: 3.0
  enable_multimodal_documents: true
  save_run_metadata: true
  max_top_k: 50
  default_top_k: 5

vector_db:
  collection_name: "video_semantic_search"
  distance_metric: "cosine"
  export_batch_size: 1000

api:
  base_url: "http://127.0.0.1:8000"